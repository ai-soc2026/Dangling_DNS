<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DangleScan — Subdomain Takeover Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0c0f;
  --surface: #111418;
  --surface2: #181c22;
  --border: #1e242d;
  --border2: #252c38;
  --text: #c8d4e0;
  --muted: #5a6677;
  --accent: #00d4ff;
  --accent-dim: rgba(0,212,255,0.08);
  --critical: #ff4757;
  --high: #ff8c00;
  --medium: #f0c040;
  --info: #4ecdc4;
  --clean: #2ed573;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'IBM Plex Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* Scanline texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

header {
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}

.logo {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.5px;
  color: var(--accent);
}

.logo span { color: var(--muted); font-weight: 400; }

#ai-status {
  font-family: var(--font-mono);
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.3s;
}
.dot.ok { background: var(--clean); box-shadow: 0 0 6px var(--clean); }
.dot.err { background: var(--critical); }

main { max-width: 1200px; margin: 0 auto; padding: 40px 32px; }

.upload-zone {
  border: 1px dashed var(--border2);
  border-radius: 8px;
  padding: 48px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
  position: relative;
  overflow: hidden;
}

.upload-zone::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent-dim);
  opacity: 0;
  transition: opacity 0.2s;
}

.upload-zone:hover::before,
.upload-zone.drag-over::before { opacity: 1; }
.upload-zone.drag-over { border-color: var(--accent); }

.upload-zone input[type=file] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
}

.upload-icon {
  font-family: var(--font-mono);
  font-size: 32px;
  color: var(--muted);
  display: block;
  margin-bottom: 12px;
}

.upload-zone h2 {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
}

.upload-zone p { color: var(--muted); font-size: 13px; }

.controls {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.file-badge {
  display: none;
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  padding: 6px 12px;
  border-radius: 4px;
  color: var(--accent);
  align-items: center;
  gap: 8px;
}

.file-badge.visible { display: flex; }

.ai-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}

.toggle-switch {
  width: 36px; height: 20px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  position: relative;
  transition: background 0.2s;
}

.toggle-switch::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--muted);
  top: 2px; left: 2px;
  transition: all 0.2s;
}

#ai-cb:checked + label .toggle-switch,
#enum-cb:checked + label .toggle-switch { background: rgba(0,212,255,0.2); border-color: var(--accent); }
#ai-cb:checked + label .toggle-switch::after,
#enum-cb:checked + label .toggle-switch::after { background: var(--accent); transform: translateX(16px); }
#ai-cb,
#enum-cb { display: none; }

.scan-btn {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 10px 28px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
}

.scan-btn:hover { background: #33ddff; transform: translateY(-1px); }
.scan-btn:active { transform: translateY(0); }
.scan-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Progress bar */
#progress-section {
  display: none;
  margin-top: 28px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}

.progress-track {
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
  width: 0%;
  box-shadow: 0 0 8px var(--accent);
}

/* Stats row */
#stats-row {
  display: none;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-top: 28px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  text-align: center;
}

.stat-card .num {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 600;
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-card .lbl {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.stat-card.critical .num { color: var(--critical); }
.stat-card.high .num { color: var(--high); }
.stat-card.medium .num { color: var(--medium); }
.stat-card.clean .num { color: var(--clean); }
.stat-card.total .num { color: var(--accent); }

/* Results table */
#results-section {
  display: none;
  margin-top: 28px;
}

.section-header {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0;
}

.filter-tabs {
  display: flex;
  gap: 4px;
}

.ftab {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}

.ftab:hover { border-color: var(--border2); color: var(--text); }
.ftab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

#results-table-wrap {
  overflow-x: auto;
  margin-top: 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 12px;
}

thead tr {
  border-bottom: 1px solid var(--border2);
}

th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  cursor: pointer;
}

tbody tr:hover { background: var(--surface); }
tbody tr.hidden-row { display: none; }

td {
  padding: 10px 14px;
  vertical-align: top;
  max-width: 280px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sev-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.sev-critical { background: rgba(255,71,87,0.15); color: var(--critical); border: 1px solid rgba(255,71,87,0.3); }
.sev-high     { background: rgba(255,140,0,0.15);  color: var(--high);     border: 1px solid rgba(255,140,0,0.3); }
.sev-medium   { background: rgba(240,192,64,0.12); color: var(--medium);   border: 1px solid rgba(240,192,64,0.3); }
.sev-info     { background: rgba(78,205,196,0.1);  color: var(--info);     border: 1px solid rgba(78,205,196,0.3); }
.sev-clean    { background: rgba(46,213,115,0.1);  color: var(--clean);    border: 1px solid rgba(46,213,115,0.3); }

.verdict-chip {
  font-size: 10px;
  color: var(--muted);
  font-style: normal;
}

/* Detail drawer */
#drawer {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 440px;
  background: var(--surface);
  border-left: 1px solid var(--border2);
  z-index: 200;
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  padding: 28px;
}

#drawer.open { transform: translateX(0); }

.drawer-close {
  position: absolute;
  top: 20px; right: 20px;
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 14px;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}

.drawer-close:hover { color: var(--text); border-color: var(--border); }

.drawer-domain {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  word-break: break-all;
  margin-bottom: 6px;
  padding-right: 40px;
}

.drawer-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.drawer-section-title {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 10px;
}

.kv-row {
  display: flex;
  gap: 12px;
  margin-bottom: 7px;
  font-size: 12px;
}

.kv-key {
  color: var(--muted);
  min-width: 110px;
  font-family: var(--font-mono);
  font-size: 11px;
}

.kv-val {
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  word-break: break-all;
}

.ai-box {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 14px;
  font-size: 13px;
  font-family: var(--font-sans);
  line-height: 1.7;
  color: var(--text);
  margin-top: 10px;
}

.ai-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.export-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}

.export-btn:hover { border-color: var(--accent); color: var(--accent); }

.confidence-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}

.conf-track {
  flex: 1;
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}

.conf-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
}

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 150;
}

.overlay.open { display: block; }

/* Scanning animation */
@keyframes scan-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.scanning-text {
  animation: scan-pulse 1.2s ease-in-out infinite;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.spinner {
  display: inline-block;
  width: 10px; height: 10px;
  border: 1.5px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
</style>
</head>
<body>

<header>
  <div class="logo">DangleScan<span>.io</span></div>
  <div id="ai-status">
    <div class="dot" id="codex-dot"></div>
    <span id="codex-label">checking codex...</span>
  </div>
</header>

<main>
  <!-- Upload -->
  <div class="upload-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".xlsx,.xls"/>
    <span class="upload-icon">[xlsx]</span>
    <h2>Drop your Excel file here</h2>
    <p>One domain per cell · any sheet · any column</p>
  </div>

  <div class="controls">
    <div class="file-badge" id="file-badge">
      <span>&#9632;</span>
      <span id="file-name-label">—</span>
      <span id="domain-count-label" style="color:var(--muted)"></span>
    </div>

    <input type="checkbox" id="ai-cb" checked/>
    <label for="ai-cb" class="ai-toggle">
      <div class="toggle-switch"></div>
      <span>Codex analysis</span>
    </label>

    <input type="checkbox" id="enum-cb"/>
    <label for="enum-cb" class="ai-toggle">
      <div class="toggle-switch"></div>
      <span>Amass/Subfinder enumeration</span>
    </label>

    <button class="scan-btn" id="scan-btn" disabled onclick="startScan()">
      Run Scan
    </button>
  </div>

  <!-- Progress -->
  <div id="progress-section">
    <div class="progress-header">
      <span class="scanning-text" id="scan-status-text">
        <span class="spinner"></span>Initializing...
      </span>
      <span id="progress-label" style="font-family:var(--font-mono);font-size:12px;color:var(--muted)">0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Stats -->
  <div id="stats-row" style="display:none;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:28px;">
    <div class="stat-card total">
      <span class="num" id="stat-total">0</span>
      <span class="lbl">Scanned</span>
    </div>
    <div class="stat-card critical">
      <span class="num" id="stat-critical">0</span>
      <span class="lbl">Critical</span>
    </div>
    <div class="stat-card high">
      <span class="num" id="stat-high">0</span>
      <span class="lbl">High</span>
    </div>
    <div class="stat-card medium">
      <span class="num" id="stat-medium">0</span>
      <span class="lbl">Medium</span>
    </div>
    <div class="stat-card clean">
      <span class="num" id="stat-clean">0</span>
      <span class="lbl">Clean</span>
    </div>
  </div>

  <!-- Results -->
  <div id="results-section">
    <div class="section-header" style="margin-top:28px;margin-bottom:0;">
      <span>Findings</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="filter-tabs">
          <button class="ftab active" data-filter="all" onclick="setFilter('all',this)">All</button>
          <button class="ftab" data-filter="critical" onclick="setFilter('critical',this)">Critical</button>
          <button class="ftab" data-filter="high" onclick="setFilter('high',this)">High</button>
          <button class="ftab" data-filter="medium" onclick="setFilter('medium',this)">Medium</button>
          <button class="ftab" data-filter="clean" onclick="setFilter('clean',this)">Clean</button>
        </div>
        <button class="export-btn" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>

    <div id="results-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Domain</th>
            <th>Severity</th>
            <th>Verdict</th>
            <th>Provider</th>
            <th>CNAME</th>
            <th>HTTP</th>
            <th>Confidence</th>
          </tr>
        </thead>
        <tbody id="results-tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<!-- Detail Drawer -->
<div id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div id="drawer-content"></div>
</div>

<script>
const API = 'http://localhost:8000';
let allResults = [];
let currentFilter = 'all';
let uploadedDomains = [];

// Check backend, Codex, and enumeration tool health
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const data = await r.json();
    const dot = document.getElementById('codex-dot');
    const lbl = document.getElementById('codex-label');
    const tools = data.tools || {};
    const enumReady = tools.amass || tools.subfinder;
    if (data.codex) {
      dot.className = 'dot ok';
      lbl.textContent = `codex ready · enum ${enumReady ? 'ready' : 'missing'}`;
    } else {
      dot.className = 'dot err';
      lbl.textContent = `codex key missing · enum ${enumReady ? 'ready' : 'missing'}`;
    }
  } catch {
    document.getElementById('codex-dot').className = 'dot err';
    document.getElementById('codex-label').textContent = 'backend offline';
  }
}
checkHealth();
setInterval(checkHealth, 15000);

// File handling
const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  document.getElementById('file-name-label').textContent = file.name;
  document.getElementById('domain-count-label').textContent = '— reading...';
  document.getElementById('file-badge').classList.add('visible');
  document.getElementById('scan-btn').disabled = false;

  // Quick count by reading file (just estimate)
  const reader = new FileReader();
  reader.onload = () => {
    document.getElementById('domain-count-label').textContent = 'ready to scan';
  };
  reader.readAsArrayBuffer(file);

  window._selectedFile = file;
}

// Stats tracking
let stats = { total: 0, critical: 0, high: 0, medium: 0, clean: 0 };

function resetStats() {
  stats = { total: 0, critical: 0, high: 0, medium: 0, clean: 0 };
  allResults = [];
  updateStatCards();
  document.getElementById('results-tbody').innerHTML = '';
}

function updateStatCards() {
  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-critical').textContent = stats.critical;
  document.getElementById('stat-high').textContent = stats.high;
  document.getElementById('stat-medium').textContent = stats.medium;
  document.getElementById('stat-clean').textContent = stats.clean;
}

async function startScan() {
  if (!window._selectedFile) return;

  resetStats();
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('progress-section').style.display = 'block';
  document.getElementById('stats-row').style.display = 'grid';
  document.getElementById('results-section').style.display = 'block';

  const useAi = document.getElementById('ai-cb').checked;
  const useEnum = document.getElementById('enum-cb').checked;
  const formData = new FormData();
  formData.append('file', window._selectedFile);
  formData.append('use_ai', useAi ? 'true' : 'false');
  formData.append('use_enum', useEnum ? 'true' : 'false');

  const response = await fetch(`${API}/scan?use_ai=${useAi}&use_enum=${useEnum}`, {
    method: 'POST',
    body: formData,
  });

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (line.startsWith('data: ')) {
        try {
          const msg = JSON.parse(line.slice(6));
          handleMessage(msg);
        } catch {}
      }
    }
  }

  document.getElementById('scan-btn').disabled = false;
  document.getElementById('scan-status-text').innerHTML = 'Scan complete';
}

function handleMessage(msg) {
  if (msg.type === 'enumerating') {
    document.getElementById('scan-status-text').innerHTML =
      msg.enabled
        ? `<span class="spinner"></span>Enumerating subdomains for ${msg.total} domains...`
        : `<span class="spinner"></span>Preparing ${msg.total} domains...`;
    document.getElementById('progress-label').textContent = `0 / ${msg.total}`;
  }

  if (msg.type === 'start') {
    document.getElementById('scan-status-text').innerHTML =
      `<span class="spinner"></span>Scanning ${msg.total} domains...`;
    document.getElementById('progress-label').textContent = `0 / ${msg.total}`;
  }

  if (msg.type === 'result') {
    const pct = Math.round((msg.completed / msg.total) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `${msg.completed} / ${msg.total}`;
    document.getElementById('scan-status-text').innerHTML =
      `<span class="spinner"></span>Scanning ${msg.total} domains...`;

    const r = msg.result;
    allResults.push(r);

    // Update stats
    stats.total++;
    if (r.severity === 'critical') stats.critical++;
    else if (r.severity === 'high') stats.high++;
    else if (r.severity === 'medium') stats.medium++;
    else stats.clean++;
    updateStatCards();

    appendRow(r);
  }

  if (msg.type === 'done') {
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('scan-status-text').textContent = `Scan complete — ${msg.completed} domains`;
  }
}

function verdictLabel(v) {
  return {
    clean: 'Clean',
    dangling_dns: 'Dangling DNS',
    takeover_vulnerable: 'Takeover Risk',
  }[v] || v;
}

function appendRow(r) {
  const tbody = document.getElementById('results-tbody');
  const sev = r.severity || 'info';
  const idx = allResults.length - 1;

  const hidden = shouldHide(r);

  const tr = document.createElement('tr');
  tr.dataset.severity = sev;
  tr.dataset.idx = idx;
  if (hidden) tr.classList.add('hidden-row');

  tr.innerHTML = `
    <td title="${r.domain}" style="color:var(--text);font-weight:500">${r.domain}</td>
    <td><span class="sev-badge sev-${sev}">${sev}</span></td>
    <td style="color:var(--muted)">${verdictLabel(r.verdict)}</td>
    <td style="color:var(--muted)">${r.provider || '—'}</td>
    <td title="${r.dns?.cname || ''}" style="color:var(--muted)">${truncate(r.dns?.cname, 30) || '—'}</td>
    <td style="color:${r.http?.status >= 400 ? 'var(--critical)' : 'var(--muted)'}">${r.http?.status || '—'}</td>
    <td>
      <div class="confidence-bar">
        <div class="conf-track"><div class="conf-fill" style="width:${r.confidence}%"></div></div>
        <span style="font-size:10px;color:var(--muted);min-width:28px">${r.confidence}%</span>
      </div>
    </td>
  `;

  tr.addEventListener('click', () => openDrawer(idx));
  tbody.prepend(tr); // newest first
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function shouldHide(r) {
  if (currentFilter === 'all') return false;
  return r.severity !== currentFilter && r.verdict !== (currentFilter === 'clean' ? 'clean' : null);
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('#results-tbody tr').forEach(tr => {
    const sev = tr.dataset.severity;
    const idx = parseInt(tr.dataset.idx);
    const r = allResults[idx];
    if (!r) return;

    let show = false;
    if (filter === 'all') show = true;
    else if (filter === 'clean') show = r.verdict === 'clean';
    else show = r.severity === filter;

    tr.classList.toggle('hidden-row', !show);
  });
}

function openDrawer(idx) {
  const r = allResults[idx];
  if (!r) return;

  const sev = r.severity || 'info';

  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-domain">${r.domain}</div>
    <span class="sev-badge sev-${sev}" style="margin-bottom:4px">${sev.toUpperCase()}</span>
    &nbsp;
    <span class="verdict-chip">${verdictLabel(r.verdict)}</span>

    <div class="drawer-section">
      <div class="drawer-section-title">Finding</div>
      <div style="font-size:13px;color:var(--text);line-height:1.6">${r.reason}</div>
      <div class="confidence-bar" style="margin-top:10px">
        <span style="font-size:11px;color:var(--muted);min-width:75px">Confidence</span>
        <div class="conf-track" style="flex:1"><div class="conf-fill" style="width:${r.confidence}%"></div></div>
        <span style="font-size:11px;color:var(--muted);min-width:32px">${r.confidence}%</span>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">DNS</div>
      <div class="kv-row"><span class="kv-key">CNAME target</span><span class="kv-val">${r.dns?.cname || 'none'}</span></div>
      <div class="kv-row"><span class="kv-key">A records</span><span class="kv-val">${(r.dns?.a_records || []).join(', ') || 'none'}</span></div>
      <div class="kv-row"><span class="kv-key">Resolves</span><span class="kv-val">${r.dns?.resolves ? 'yes' : 'no'}</span></div>
      <div class="kv-row"><span class="kv-key">NXDOMAIN</span><span class="kv-val" style="color:${r.dns?.nxdomain ? 'var(--critical)' : 'var(--muted)'}">${r.dns?.nxdomain ? 'YES' : 'no'}</span></div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">HTTP</div>
      <div class="kv-row"><span class="kv-key">Status</span><span class="kv-val" style="color:${(r.http?.status||0) >= 400 ? 'var(--critical)' : 'var(--clean)'}">${r.http?.status || 'no response'}</span></div>
      <div class="kv-row"><span class="kv-key">Title</span><span class="kv-val">${r.http?.title || '—'}</span></div>
      <div class="kv-row"><span class="kv-key">Provider</span><span class="kv-val">${r.provider || '—'}</span></div>
      <div class="kv-row"><span class="kv-key">Scan time</span><span class="kv-val">${r.scan_time_s}s</span></div>
    </div>

    ${r.ai_analysis ? `
    <div class="drawer-section">
      <div class="drawer-section-title">AI analysis</div>
      <div class="ai-box">
        <div class="ai-label">Codex</div>
        ${r.ai_analysis}
      </div>
    </div>` : ''}

    <div class="drawer-section">
      <div class="drawer-section-title">Remediation</div>
      <div style="font-size:13px;color:var(--text);line-height:1.6">${getRemediation(r)}</div>
    </div>
  `;

  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function getRemediation(r) {
  if (r.verdict === 'clean') return 'No action required.';
  if (r.verdict === 'takeover_vulnerable') {
    return `<strong style="color:var(--critical)">IMMEDIATE ACTION REQUIRED.</strong><br>
    1. Delete the DNS record for <code>${r.domain}</code> immediately.<br>
    2. If the service is still needed, re-provision it and update the DNS target.<br>
    3. Audit who created this record and when.<br>
    4. Check if the ${r.provider || 'cloud'} resource was already claimed by a third party.`;
  }
  if (r.verdict === 'dangling_dns') {
    return `1. Verify if <code>${r.domain}</code> is still in use with the owning team.<br>
    2. If abandoned, remove the DNS record immediately.<br>
    3. If still needed, fix the ${r.provider || 'cloud'} resource it points to.<br>
    4. Add to your DNS cleanup runbook.`;
  }
  return 'Review and confirm with the owning team.';
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function exportCSV() {
  const rows = [['Domain','Severity','Verdict','Provider','CNAME','HTTP Status','Confidence','AI Analysis','Reason']];
  for (const r of allResults) {
    rows.push([
      r.domain, r.severity, r.verdict, r.provider || '',
      r.dns?.cname || '', r.http?.status || '',
      r.confidence, r.ai_analysis || '', r.reason
    ]);
  }
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `danglescan-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
